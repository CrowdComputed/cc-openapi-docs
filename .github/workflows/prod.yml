name: prod

on:
  push:
    tags:
      - v*.*.*

env:
  TZ: Asia/Shanghai
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.APP_NAME }}
  NODE_VERSION: "20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deployment
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Restore Next cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-cache-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s','**/*.[jt]sx','**/*.css','next.config.*') }}
          restore-keys: |
            next-cache-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Generate .env file
        run: |
          cat > .env << EOF
          NEXT_PUBLIC_TOLGEE_API_KEY=${{ secrets.TOLGEE_API_KEY }}
          NEXT_PUBLIC_TOLGEE_API_URL=${{ vars.TOLGEE_API_URL }}
          ALIMT_ACCESS_KEY_ID=${{ vars.ALIYUN_ACCESS_KEY_ID }}
          ALIMT_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIMT_REGION_ID=cn-hongkong
          EOF

      - name: Tolgee pull
        run: pnpm tolgee:pull

      - name: Build Next.js (standalone)
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=raw,value=stable

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/production/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

      - name: Deploy to Node
        uses: CrowdComputed/ssh-action@master
        with:
          command: |
            set -e
            cd /opt/cc-deploy/project/cc-nex
            ./deploy_prod.sh latest
          host: ${{ vars.ECS_HOST }}
          user: ${{ vars.ECS_USER }}
          pass: ${{ secrets.ECS_PASSWORD }}

      - name: Notify Failure to Discord Channel
        if: failure()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        with:
          args: |
            ❌ Production deployment failed for version ${{ vars.APP_NAME }}:${{ github.ref_name }}
            Tag: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}
            Environment: Production

      - name: Notify Success to Discord Channel
        if: success()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
        with:
          args: |
            ✅ Production deployment successful for version ${{ vars.APP_NAME }}:${{ github.ref_name }}
            Tag: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Environment: Production
